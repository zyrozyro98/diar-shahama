<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Outfit:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --p-red: #a11d21;
            --p-copper: #b8860b;
            --bg-dark: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 150px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--p-red), var(--p-copper));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            letter-spacing: -5px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        h1 {
            font-size: 32px;
            margin: 20px 0;
        }

        p {
            color: var(--text-dim);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-premium {
            display: inline-block;
            padding: 15px 40px;
            background: var(--p-red);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(161, 29, 33, 0.3);
        }

        .btn-premium:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(161, 29, 33, 0.5);
            background: #c02428;
        }

        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(161, 29, 33, 0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="error-code">404</div>
        <h1>عذراً، المسار غير صحيح</h1>
        <p>يبدو أن الصفحة التي تبحث عنها قد تم نقلها أو أنها لم تعد موجودة. لا تقلق، يمكنك العودة إلى صالة العرض
            الرئيسية دائماً.</p>
        <a href="/" class="btn-premium">العودة للرئيسية</a>
    </div>
</body>

</html>
